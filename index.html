<!DOCTYPE html>
<html lang="fr" id="html-root">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' file:; img-src 'self' data: file:; media-src 'self' file:; connect-src 'self' file:;">
<title>AURA 4K â€” Game Launcher</title>
<link rel="preload" as="style" href="fonts.css">
<link rel="stylesheet" href="fonts.css">
<link rel="preload" as="style" href="renderer-index.css">
<link rel="stylesheet" href="renderer-index.css">
</head>
<body>
<div id="cur"></div>

<div id="skeleton-loader">
  <div class="sk-bg"></div>
  <div class="sk-content">
    <div class="sk-title"></div>
    <div class="sk-tags">
      <div class="sk-tag"></div>
      <div class="sk-tag"></div>
      <div class="sk-tag"></div>
    </div>
    <div class="sk-shots">
      <div class="sk-shot"></div>
      <div class="sk-shot"></div>
      <div class="sk-shot"></div>
    </div>
  </div>
  <div class="sk-spinner"></div>
</div>

<div id="loading-progress" class="hidden">
  <div class="lp-bar"><div class="lp-fill"></div></div>
  <div class="lp-text">Chargement...</div>
</div>

<div id="scaler">
<div class="screen" id="screen">

  <div class="slot sL">
    <div class="bg-a" id="bgLa"></div>
    <div class="bg-b" id="bgLb"></div>
    <div class="logo"><img class="logo-img" src="ui/aura-logo.png" alt="AURA 4K"></div>
    <div class="sname" id="snL"><span></span></div>
  </div>

  <div class="slot sC">
    <div class="bg-a" id="bgCa"></div>
    <div class="bg-b" id="bgCb"></div>
    <div class="gtitle" id="gtitle">â€”</div>
    <div class="gtags" id="gtags"></div>

    <div class="shots">
      <div class="shot"><div class="shot-in" id="s0"></div></div>
      <div class="shot"><div class="shot-in" id="s1"></div></div>
      <div class="shot"><div class="shot-in" id="s2"></div></div>
    </div>

    <div class="btns">
      <button class="nav-item" id="navLeft"><div class="ci L"><div class="ci-h"></div><div class="ci-v"></div><div class="arm"></div></div><span data-i18n="nav.prev">Jeu prÃ©cÃ©dent</span></button>
      <button class="nav-item" id="navRight"><div class="ci R"><div class="ci-h"></div><div class="ci-v"></div><div class="arm"></div></div><span data-i18n="nav.next">Jeu suivant</span></button>
      <button class="nav-item" id="navUp"><div class="ci U"><div class="ci-h"></div><div class="ci-v"></div><div class="arm"></div></div><span data-i18n="nav.letter.prev">Lettre prÃ©cÃ©dente</span></button>
      <button class="nav-item" id="navDown"><div class="ci D"><div class="ci-h"></div><div class="ci-v"></div><div class="arm"></div></div><span data-i18n="nav.letter.next">Lettre suivante</span></button>

      <div class="sep"></div>

      <div class="manette-group">
        <div class="manette-btn" id="btnB">
          <div class="round">B</div>
          <span class="label" data-i18n="btn.play">Jouer</span>
        </div>
        <div class="manette-btn" id="btnY">
          <div class="round">Y</div>
          <span class="label" id="favLabel" data-i18n="btn.favorite">Favori</span>
        </div>
        <div class="manette-btn" id="btnX">
          <div class="round">X</div>
          <span class="label" data-i18n="btn.screenshots">Screenshots</span>
        </div>
        <div class="manette-btn" id="btnA">
          <div class="round">A</div>
          <span class="label" data-i18n="btn.quit">Quitter</span>
        </div>
      </div>
    </div>

    <div class="pub" id="pub"></div>
  </div>

  <div class="slot sR">
    <div class="bg-a" id="bgRa"></div>
    <div class="bg-b" id="bgRb"></div>
    <div class="clock"><div class="clock-h" id="ch">00:00</div><div class="clock-d" id="cd">00.00.0000</div></div>
    <div class="sname" id="snR"><span></span></div>
  </div>

  <div class="alpha" id="alpha"></div>
  <div id="fav-indicator">
    <span>â˜… FAVORIS</span>
  </div>
  <div class="flash" id="flash"></div>
  <div class="cristal-container">
    <img src="ui/cristal.png" class="cristal-img">
  </div>

</div>
</div>

<div id="intro">
  <img class="intro-logo" src="ui/aura-logo.png" alt="AURA">
</div>



<script type="module" src="./js/index-page.js"></script>
</body>
</html>
