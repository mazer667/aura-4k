.bg-a, .bg-b {
  position:absolute; inset:0;
  background-size:cover; background-position:center;
  transition: opacity 0.6s ease;
}
.sL .bg-a, .sL .bg-b,

}
.sL::before, .sR::before {
  content: '';

  inset: 0;
  background: rgba(20, 30, 60, 0.4);
  pointer-events: none;
  z-index: 3;
  mix-blend-mode: multiply;
}
.sL .grain, .sR .grain { opacity: 0.25; z-index: 5; }
.bg-a { opacity:1; z-index:0; }
.bg-b { opacity:0; z-index:1; }

.sL::after, .sR::after {
  content: '';
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
}
.sL::after { background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.0) 100%); }
.sR::after { background: linear-gradient(to left, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.0) 100%); }

.grain {

}
@keyframes gn {
  0%{background-position:0 0} 16%{background-position:-52px 24px}
  33%{background-position:36px -44px} 50%{background-position:-68px 14px}
  66%{background-position:20px -54px} 83%{background-position:-40px 68px}
  100%{background-position:58px -20px}
}

.cvign {

<style>
#skeleton-loader {

}
.sk-spinner {

  width: 40px;

  border: 3px solid rgba(94,184,255,0.2);

@keyframes shimmer {

/* Loading Progress Bar */
#loading-progress {
  position: fixed;
  bottom: 60px;
  left: 50%;

  z-index: 100;

  transition: opacity 0.3s, transform 0.3s;
}
#loading-progress.hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(20px);
  pointer-events: none;
}
.lp-bar {
  width: 200px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.lp-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #5eb8ff, #a78bfa);
  border-radius: 2px;
  transition: width 0.3s ease;
}
.lp-text {
  font-family: 'Barlow', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.7);
